# globalpayments — deploy to Dev (Gateway account, us-east-2). Auto on push to main.
# Thin caller of the reusable _deploy.yml.
name: deploy-develop

on:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  dev:
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: dev
      aws_region:  us-east-2
      role_arn:    ${{ vars.DEV_ROLE_ARN }}
      registry:    ${{ vars.DEV_REGISTRY }}
      ecr_repo:    tpp-dev/global-payments
      legacy_ecr_repo: tpp-gateway/globalpayments-python-service
      image_tag:   dev
      ecs_cluster: tpp-dev-ecs-cluster
      ecs_service: tpp-dev-globalpayments-service

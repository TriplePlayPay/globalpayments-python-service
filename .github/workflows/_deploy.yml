# Reusable deploy workflow (per-repo copy — will be centralised later per ITPP-162).
# Called once per environment by deploy.yml. One build per run, tagged with the git-sha AND the
# environment tag, pushed to the target ECR, then the ECS service is rolled and waited on.
#
# Routing is decided entirely by the caller's inputs:
#   dev / sandbox -> Gateway account 917220117358 (us-east-2)
#   production    -> TPP account     907119984749 (us-east-1)
#
# The approval gate is enforced by GitHub Environments: only environment=production carries
# required reviewers, so only prod pauses for approval. dev/sandbox run with no gate.
# Auth is OIDC only (no static keys).

name: _deploy

on:
  workflow_call:
    inputs:
      environment: { type: string, required: true }            # dev | sandbox | production
      aws_region:  { type: string, required: true }
      role_arn:    { type: string, required: true }
      registry:    { type: string, required: true }
      ecr_repo:    { type: string, required: true }
      image_tag:   { type: string, required: true }            # moving tag: dev | sandbox | master
      base_image:  { type: string, required: false, default: '' }   # optional Docker build-arg
      ecs_cluster: { type: string, required: false, default: '' }   # empty => skip ECS deploy
      ecs_service: { type: string, required: false, default: '' }

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment == 'production' && 'production' || '' }}
    concurrency:
      group: deploy-${{ inputs.environment }}-${{ github.repository }}
    permissions:
      id-token: write   # OIDC
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (enables the arm64 build on the amd64 runner)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx (multi-platform builder)
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role_arn }}
          aws-region: ${{ inputs.aws_region }}

      - name: Confirm identity (assumed-role in the target account)
        run: aws sts get-caller-identity

      - name: Log in to the target ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push (multi-arch amd64+arm64; git-sha + ${{ inputs.image_tag }})
        run: |
          IMG="${{ inputs.registry }}/${{ inputs.ecr_repo }}"
          BASE_ARG=""
          if [ -n "${{ inputs.base_image }}" ]; then
            BASE_ARG="--build-arg BASE_IMAGE=${{ inputs.base_image }}"
          fi
          docker buildx build . \
            --platform=linux/amd64,linux/arm64 $BASE_ARG \
            --provenance=false \
            -t "$IMG:${{ github.sha }}" \
            -t "$IMG:${{ inputs.image_tag }}" \
            --push

      - name: Deploy to ECS (auto-skips until cluster/service are provided)
        if: ${{ inputs.ecs_cluster != '' && inputs.ecs_service != '' }}
        run: |
          aws ecs update-service --region "${{ inputs.aws_region }}" --force-new-deployment \
            --cluster "${{ inputs.ecs_cluster }}" --service "${{ inputs.ecs_service }}"
          aws ecs wait services-stable --region "${{ inputs.aws_region }}" \
            --cluster "${{ inputs.ecs_cluster }}" --services "${{ inputs.ecs_service }}"

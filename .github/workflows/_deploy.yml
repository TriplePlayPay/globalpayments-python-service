# Reusable deploy workflow (per-repo copy — will be centralised later per ITPP-162).
# Called once per environment by deploy.yml. One build per run, tagged with the git-sha AND the
# environment tag, pushed to the target ECR, then the ECS service is rolled and waited on.
#
# Routing is decided entirely by the caller's inputs:
#   dev / sandbox -> Gateway account 917220117358 (us-east-2)
#   production    -> TPP account     907119984749 (us-east-1)
#
# The approval gate is enforced by GitHub Environments: only environment=production carries
# required reviewers, so only prod pauses for approval. dev/sandbox run with no gate.
# Auth is OIDC only (no static keys).

name: _deploy

on:
  workflow_call:
    inputs:
      environment: { type: string, required: true }            # dev | sandbox | production
      aws_region:  { type: string, required: true }
      role_arn:    { type: string, required: true }
      registry:    { type: string, required: true }
      ecr_repo:    { type: string, required: true }
      legacy_ecr_repo: { type: string, required: false, default: '' }   # ITPP-273 backward-compat dual-push; remove after task-def flip
      image_tag:   { type: string, required: true }            # new per-env repo moving tag (env is in the repo path) => 'latest'
      legacy_image_tag: { type: string, required: false, default: '' }  # legacy shared-repo moving tag: dev | sandbox | latest
      base_image:  { type: string, required: false, default: '' }   # optional Docker build-arg
      ecs_cluster: { type: string, required: false, default: '' }   # empty => skip ECS deploy
      ecs_service: { type: string, required: false, default: '' }
      ecs_cluster_2: { type: string, required: false, default: '' }  # prod ramp: 2nd (new-prod) cluster; roll both old+new while traffic ramps
      ecs_service_2: { type: string, required: false, default: '' }

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment == 'production' && 'production' || '' }}
    concurrency:
      group: deploy-${{ inputs.environment }}-${{ github.repository }}
    permissions:
      id-token: write   # OIDC
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (enables the arm64 build on the amd64 runner)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx (multi-platform builder)
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role_arn }}
          aws-region: ${{ inputs.aws_region }}

      - name: Confirm identity (assumed-role in the target account)
        run: aws sts get-caller-identity

      - name: Log in to the target ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push (multi-arch amd64+arm64; git-sha + ${{ inputs.image_tag }})
        run: |
          IMG="${{ inputs.registry }}/${{ inputs.ecr_repo }}"
          BASE_ARG=""
          if [ -n "${{ inputs.base_image }}" ]; then
            BASE_ARG="--build-arg BASE_IMAGE=${{ inputs.base_image }}"
          fi
          TAGS=(-t "$IMG:${{ github.sha }}" -t "$IMG:${{ inputs.image_tag }}")
          # ITPP-273 backward-compat: also push to the legacy repo (same account) until the ECS task def flips.
          # This is the buildx --push variant, so add legacy tags to the single multi-arch build rather than
          # docker tag/push (the image is never loaded into the local daemon).
          if [ -n "${{ inputs.legacy_ecr_repo }}" ]; then
            LEG="${{ inputs.registry }}/${{ inputs.legacy_ecr_repo }}"
            TAGS+=(-t "$LEG:${{ github.sha }}" -t "$LEG:${{ inputs.legacy_image_tag }}")
          fi
          docker buildx build . \
            --platform=linux/amd64,linux/arm64 $BASE_ARG \
            --provenance=false \
            "${TAGS[@]}" \
            --push

      - name: Deploy to ECS (rolls each provided cluster/service; auto-skips empties)
        if: ${{ inputs.ecs_cluster != '' && inputs.ecs_service != '' }}
        run: |
          REGION="${{ inputs.aws_region }}"
          roll() {
            CLUSTER="$1"; SERVICE="$2"
            if [ -z "$CLUSTER" ] || [ -z "$SERVICE" ]; then return 0; fi
            echo "== Rolling $SERVICE on $CLUSTER =="
            aws ecs update-service --region "$REGION" --force-new-deployment --cluster "$CLUSTER" --service "$SERVICE" >/dev/null
            for i in $(seq 1 60); do
              STATE=$(aws ecs describe-services --region "$REGION" --cluster "$CLUSTER" --services "$SERVICE" --query 'services[0].deployments[0].rolloutState' --output text)
              echo "  [$i/60] $SERVICE rolloutState=$STATE"
              [ "$STATE" = "COMPLETED" ] && { echo "$SERVICE COMPLETED."; return 0; }
              [ "$STATE" = "FAILED" ] && { echo "$SERVICE FAILED."; return 1; }
              sleep 30
            done
            echo "$SERVICE timed out after 30 min."; return 1
          }
          FAILED=0
          roll "${{ inputs.ecs_cluster }}"   "${{ inputs.ecs_service }}"   || FAILED=1
          roll "${{ inputs.ecs_cluster_2 }}" "${{ inputs.ecs_service_2 }}" || FAILED=1
          [ "$FAILED" = "1" ] && { echo "One or more rollouts failed."; exit 1; }
          echo "All rollouts COMPLETED."; exit 0

# globalpayments — deploy to Production (TPP account, us-east-1). Manual only, gated.
# Thin caller of the reusable _deploy.yml; pauses at the 'production' Environment's reviewers.
name: deploy-production

on:
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  # Guard: production only ever deploys from main.
  prod-branch-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check branch is main
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          if [ "$BRANCH" != "main" ]; then
            echo "Branch '$BRANCH' is not main — aborting production deployment."; exit 1
          fi
          echo "On main — ok."

  production:
    needs: prod-branch-validate
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: production
      aws_region:  us-east-1
      role_arn:    ${{ vars.PROD_ROLE_ARN }}
      registry:    ${{ vars.PROD_REGISTRY }}
      ecr_repo:    tpp-prod/global-payments
      legacy_ecr_repo: globalpayments-service
      image_tag:   latest
      legacy_image_tag: latest
      ecs_cluster: payments-prod-payments-cluster
      ecs_service: payments-prod-global-payments-service
      # Prod traffic ramp (both envs live): also roll the new-prod cluster.
      ecs_cluster_2: tpp-prod-ecs-cluster
      ecs_service_2: tpp-prod-global-payments-service

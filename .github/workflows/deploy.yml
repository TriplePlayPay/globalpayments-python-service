# globalpayments-python-service deploy pipeline (ITPP-162).
#   push to master           -> dev + sandbox, automatically (Gateway account)
#   manual workflow_dispatch -> production (TPP account), behind the approval gate
# Deploy logic lives once in _deploy.yml; each job calls it with this env's values.

name: deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  dev:
    if: ${{ github.event_name == 'push' }}
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: dev
      aws_region:  us-east-2
      role_arn:    arn:aws:iam::917220117358:role/github-actions-globalpayments-developer
      registry:    917220117358.dkr.ecr.us-east-2.amazonaws.com
      ecr_repo:    tpp-gateway/globalpayments-python-service
      image_tag:   dev
      ecs_cluster: tpp-dev-ecs-cluster
      ecs_service: tpp-dev-globalpayments-service

  sandbox:
    if: ${{ github.event_name == 'push' }}
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: sandbox
      aws_region:  us-east-2
      role_arn:    arn:aws:iam::917220117358:role/github-actions-globalpayments-developer
      registry:    917220117358.dkr.ecr.us-east-2.amazonaws.com
      ecr_repo:    tpp-gateway/globalpayments-python-service
      image_tag:   sandbox
      ecs_cluster: ''   # no Gateway sandbox cluster exists yet -> ECS deploy auto-skips (build+push only)
      ecs_service: ''

  # production -> TPP. Manual only. Uses the SHARED prod-deploy-payments-role (Akash is widening its
  # trust+perms to cover this repo). Real prod ECR + ECS are set so the deploy actually runs (no skip).
  # NOTE: prod guards (branch-validate + approval via the GitHub App) to be added before go-live (Ramesh).
  production:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: production
      aws_region:  us-east-1
      role_arn:    arn:aws:iam::907119984749:role/prod-deploy-payments-role
      registry:    907119984749.dkr.ecr.us-east-1.amazonaws.com
      ecr_repo:    globalpayments-service
      image_tag:   latest
      ecs_cluster: payments-prod-payments-cluster
      ecs_service: payments-prod-global-payments-service

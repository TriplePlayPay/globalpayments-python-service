# Build the globalpayments-python-service image and push it to ECR in the GATEWAY account
# (gateway-nonprod, 917220117358), region us-east-2, no cross-region. Modeled on the payments
# repo's deploy-develop-gateway.yml.
#
# Branch routing (mirrors payments):
#   main    -> TPP account (existing, untouched)
#   develop -> Gateway account 917220117358, us-east-2  (this file)
#
# Auth is OIDC only (no long-lived keys). Built explicitly amd64: the gateway dev env runs the
# globalpayments task on x86/amd64, so the image AND the ECS task arch (cpuArchitecture=X86_64)
# must match. (globalpayments runs ARM64 in TPP today; the gateway env is amd64.)
#
# Base image: python:3.11.9-alpine is PUBLIC + multi-arch (Docker Hub) -> the build pulls it
#   directly; NO base mirror into ECR needed (unlike payments, whose base was a private
#   x86-only ECR image that had to be crane-copied first).
#
# [BLOCKERS - Akash/Terraform must provision in 917220117358 before this runs green]:
#   * ECR repo:  tpp-gateway/globalpayments-python-service  (us-east-2, scanOnPush)
#   * OIDC role: github-actions-globalpayments-developer  with trust sub
#       repo:TriplePlayPay/globalpayments-python-service:ref:refs/heads/develop
#       (+ a temp ref for deva/gateway-dev-cicd while validating) and ECR push perms
#
# [IMPORTANT - PRIVATE DEP]: the build runs `poetry install`, which clones
#   github.com/TriplePlayPay/globalpayments-python-sdk. If that repo is PRIVATE, the build needs a
#   read token - add a repo secret (e.g. SDK_CLONE_TOKEN) + a BuildKit secret mount (see the
#   commented Build step below + a matching `RUN --mount=type=secret` in the Dockerfile).
#   [CONFIRM repo visibility before the first run.]

name: deploy-develop-gateway

permissions:
  id-token: write   # required for OIDC
  contents: read    # required for actions/checkout

on:
  workflow_dispatch:
  push:
    branches: [ develop ]
  # Validation: add `deva/gateway-dev-cicd` here temporarily (with a matching OIDC trust ref)
  # to test on the branch, then remove once green - same flow as payments.

env:
  AWS_REGION: us-east-2
  # [Akash: create this OIDC role in 917220117358 (trust = the globalpayments repo, ECR push perms)]
  ROLE_ARN: arn:aws:iam::917220117358:role/github-actions-globalpayments-developer
  REGISTRY: 917220117358.dkr.ecr.us-east-2.amazonaws.com
  ECR_REPO: tpp-gateway/globalpayments-python-service   # [Akash: create this ECR repo]
  IMAGE_TAG: dev
  # Gateway dev ECS target for the deploy step. Set as GitHub repo Variables once Akash provides
  # them (Settings > Secrets and variables > Actions > Variables). Empty => deploy step skips.
  DEV_CLUSTER: ${{ vars.GW_DEV_ECS_CLUSTER }}
  DEV_SERVICE: ${{ vars.GW_DEV_ECS_SERVICE }}

jobs:
  build-push:
    name: Build & push to gateway ECR (us-east-2)
    runs-on: ubuntu-latest   # amd64 runner -> native amd64 build
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Confirm identity (expect assumed-role in the gateway account)
        run: aws sts get-caller-identity

      - name: Log in to gateway ECR (push target)
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push (amd64)
        # If globalpayments-python-sdk is PRIVATE, replace the plain build below with a BuildKit
        # secret so `poetry install` can clone it (token never baked into the image):
        #   env: { SDK_CLONE_TOKEN: ${{ secrets.SDK_CLONE_TOKEN }} }
        #   DOCKER_BUILDKIT=1 docker build . --platform=linux/amd64 \
        #     --secret id=ghtoken,env=SDK_CLONE_TOKEN -t "$REGISTRY/$ECR_REPO:$IMAGE_TAG"
        #   (+ in the Dockerfile builder stage:
        #      RUN --mount=type=secret,id=ghtoken git config --global \
        #        url."https://x-access-token:$(cat /run/secrets/ghtoken)@github.com/".insteadOf "https://github.com/" \
        #        && poetry install --without dev)
        run: |
          docker build . --platform=linux/amd64 -t "$REGISTRY/$ECR_REPO:$IMAGE_TAG"
          docker push "$REGISTRY/$ECR_REPO:$IMAGE_TAG"

      - name: Deploy to gateway dev ECS (auto-skips until the GW_DEV_ECS_* repo vars are set)
        if: vars.GW_DEV_ECS_CLUSTER != '' && vars.GW_DEV_ECS_SERVICE != ''
        run: |
          aws ecs update-service --region "$AWS_REGION" --force-new-deployment \
            --cluster "$DEV_CLUSTER" --service "$DEV_SERVICE"
